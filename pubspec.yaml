name: gps_time_plugin
description: A Flutter plugin that provides GPS-synced trusted time on Android, iOS, and macOS, resistant to manual device clock changes.
version: 0.0.1
homepage: https://github.com/shahriarsaem/gps_time_plugin
repository: https://github.com/shahriarsaem/gps_time_plugin
issue_tracker: https://github.com/shahriarsaem/gps_time_plugin/issues

topics:
  - gps
  - time
  - location
  - clock
  - trusted-time

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.shahriarsaem.gpstimeplugin
        pluginClass: GpsTimePlugin
      ios:
        pluginClass: GpsTimePlugin
      macos:
        pluginClass: GpsTimePlugin
